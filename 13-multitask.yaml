- name: playing with loops
  hosts: local
  connection: local
  become: true
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
      - {name: "nginx", state: "absent"}
      - {name: "zip", state: "present"}
      - {name: "mysql", state: "absent"}